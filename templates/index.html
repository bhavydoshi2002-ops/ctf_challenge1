<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureBank™ — Staff Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 2rem;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .logo {
    text-align: center;
    font-size: 2rem;
    margin-bottom: .3rem;
  }
  .logo-text {
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
    color: #58a6ff;
    margin-bottom: .2rem;
  }
  .logo-sub {
    text-align: center;
    font-size: 12px;
    color: #484f58;
    margin-bottom: 1.8rem;
  }
  label {
    display: block;
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 5px;
  }
  input {
    display: block;
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 14px;
    padding: 10px 13px;
    margin-bottom: 1.1rem;
    outline: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  input:focus { border-color: #58a6ff; }
  .btn {
    width: 100%;
    background: #1f6feb;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .btn:hover { background: #388bfd; }
  .btn:active { background: #1158c7; }
  #output {
    display: none;
    margin-top: 1rem;
    padding: 11px 13px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    color: #7ee787;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 220px;
    overflow-y: auto;
  }
  #output.err { color: #f85149; }
  #output.flag { color: #39ff14; border-color: #39ff14; background: #0a1a0a; }
  .divider { border: none; border-top: 1px solid #21262d; margin: 1.5rem 0; }
  .api-hint {
    font-size: 12px;
    color: #484f58;
    font-family: 'Courier New', monospace;
    line-height: 1.9;
  }
  .api-hint .method-post { color: #d29922; }
  .api-hint .method-get  { color: #56d364; }
  .api-hint .path        { color: #8b949e; }
</style>
</head>
<body>

<!-- TODO: remove debug endpoint before production!! /admin_debug -->

<div class="card">
  <div class="logo">🏦</div>
  <div class="logo-text">SecureBank™</div>
  <div class="logo-sub">Staff Portal — Authorized Personnel Only</div>

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Enter your username" autocomplete="off">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Enter your password">

  <button class="btn" onclick="doLogin()">Sign In</button>

  <pre id="output"></pre>

  <hr class="divider">

  <div class="api-hint">
    <span class="method-post">POST</span> <span class="path">/login</span><br>
    <span class="method-get">GET</span>&nbsp; <span class="path">/dashboard</span><br>
    <span class="method-get">GET</span>&nbsp; <span class="path">/???</span>
  </div>
</div>

<script>
  async function doLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    const out  = document.getElementById('output');

    if (!user) { show('Username required!', 'err'); return; }

    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      const isFlag = JSON.stringify(data).includes('CTF{');
      show(JSON.stringify(data, null, 2), isFlag ? 'flag' : '');
    } catch (e) {
      show('Error: ' + e.message, 'err');
    }
  }

  function show(text, cls = '') {
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.className = cls;
    out.textContent = text;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
